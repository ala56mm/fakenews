<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            max-width: 650px;
            width: 100%;
            padding: 50px;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #e94560, #0f3460, #e94560);
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .header h1 {
            color: #1a1a2e;
            font-size: 2.4em;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .header .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .header p {
            color: #666;
            font-size: 1.05em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 1em;
        }
        
        textarea {
            width: 100%;
            height: 140px;
            padding: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        textarea:focus {
            outline: none;
            border-color: #0f3460;
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(233, 69, 96, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            display: none;
            position: relative;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.4s ease-out;
        }
        
        .result.fake {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }
        
        .result.real {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .result-label {
            font-size: 2.8em;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .result-confidence {
            font-size: 1.3em;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .result-probabilities {
            font-size: 0.95em;
            opacity: 0.9;
        }
        
        .error {
            background: #fff0f0;
            border: 2px solid #e94560;
            color: #c92a2a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #888;
            font-size: 0.85em;
        }
        
        .sample-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .sample-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            color: #333;
        }
        
        .sample-btn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-25px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📰</div>
            <h1>Fake News Detection</h1>
            <p>Enter any news headline or article to analyze</p>
        </div>
        
        <form id="newsForm">
            <div class="form-group">
                <label for="newsText">News Text</label>
                <textarea 
                    id="newsText" 
                    name="text" 
                    placeholder="Paste news article or headline here..."
                    required
                ></textarea>
                <div class="sample-buttons">
                    <button type="button" class="sample-btn" onclick="loadSample('fake')">Load Fake Sample</button>
                    <button type="button" class="sample-btn" onclick="loadSample('real')">Load Real Sample</button>
                    <button type="button" class="sample-btn" onclick="clearText()">Clear</button>
                </div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Analyze News</span>
            </button>
        </form>
        
        <div class="result" id="result">
            <div class="result-label" id="resultLabel"></div>
            <div class="result-confidence" id="resultConfidence"></div>
            <div class="result-probabilities" id="resultProbabilities"></div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="footer">
            <p>Powered by Machine Learning & NLP</p>
        </div>
    </div>
    
    <script>
        const fakeSamples = [
            "Doctors shocked to discover incredible weight loss secret that works overnight",
            "Ancient prophecy predicts world ending next year - scientists confirm",
            "Scientists admit this kitchen ingredient cures all diseases but pharma hides it",
            "Government hides evidence of UFO contact from public for decades"
        ];
        
        const realSamples = [
            "Scientists discover new species of butterfly in Amazon rainforest",
            "Stock market closes higher following positive economic data",
            "City council approves new budget for public transportation",
            "Federal Reserve maintains interest rates unchanged"
        ];
        
        function loadSample(type) {
            const samples = type === 'fake' ? fakeSamples : realSamples;
            const randomSample = samples[Math.floor(Math.random() * samples.length)];
            document.getElementById('newsText').value = randomSample;
        }
        
        function clearText() {
            document.getElementById('newsText').value = '';
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }
        
        const form = document.getElementById('newsForm');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultLabel = document.getElementById('resultLabel');
        const resultConfidence = document.getElementById('resultConfidence');
        const resultProbabilities = document.getElementById('resultProbabilities');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = document.getElementById('newsText').value.trim();
            
            if (!text) {
                showError('Please enter some text to analyze');
                return;
            }
            
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>Analyzing...';
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(data.label, data.confidence, data.probabilities);
                } else {
                    showError(data.error || 'An error occurred');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Analyze News';
            }
        });
        
        function showResult(label, confidence, probabilities) {
            errorDiv.classList.remove('show');
            resultDiv.className = 'result show ' + (label === 'FAKE' ? 'fake' : 'real');
            resultLabel.textContent = label === 'FAKE' ? 'FAKE NEWS!' : 'REAL NEWS';
            resultConfidence.textContent = `Confidence: ${confidence}%`;
            
            if (probabilities) {
                resultProbabilities.textContent = `FAKE: ${probabilities.FAKE || 0}% | REAL: ${probabilities.REAL || 0}%`;
            }
        }
        
        function showError(message) {
            resultDiv.classList.remove('show');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
